# Render Blueprint — LOW-COST topology (~$7/mo to start, or ~$0 with a free API).
# Everything (worker + Radian + Encompass + scheduler) runs IN-PROCESS inside one
# always-on API. Postgres + Key Value use free tiers. The PWA is a free static site.
#
# To scale out to the full 8-service architecture later, deploy render.full.yaml
# (separate worker, cron, and private services) — no code changes required.
#
# Cost notes:
#   - indigold-pwa (static) ............ free
#   - indigold-api (starter) ........... ~$7/mo  (must stay always-on for the
#                                         embedded worker; use plan: free for ~$0
#                                         but it sleeps and won't process jobs while idle)
#   - indigold-db (free) ............... free for ~30 days, then upgrade to basic-256mb
#   - indigold-cache / Key Value (free)  free (25 MB)

databases:
  - name: indigold-db
    databaseName: indigold
    user: indigold
    plan: free            # expires ~30 days; change to basic-256mb to persist
    region: oregon

services:
  # ---- Key Value (Redis): sessions, rate limits, token budget, job queue ----
  - type: redis
    name: indigold-cache
    plan: free            # 25 MB; plenty for sessions + a light job queue
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ---- Static Site: PWA (free) ----
  - type: web
    runtime: static
    name: indigold-pwa
    rootDir: apps/pwa
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: indigold-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ---- Web Service: API + embedded worker + scheduler + Radian/Encompass ----
  - type: web
    runtime: node
    name: indigold-api
    rootDir: apps/api
    plan: starter         # change to `free` for ~$0 (sleeps; jobs only run while awake)
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_WORKER          # process the job queue in-process
        value: "true"
      - key: RUN_SCHEDULER       # self-schedule daily/weekly/monitor fan-out
        value: "true"
      - key: DAILY_TOKEN_BUDGET
        value: "200000"
      - key: DATABASE_URL
        fromDatabase:
          name: indigold-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: indigold-cache
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PWA_ORIGIN
        fromService:
          type: web
          name: indigold-pwa
          property: host
      # RADIAN_URL / ENCOMPASS_URL intentionally unset -> intelligence runs in-process.
