# Render Blueprint — LOW-COST topology (~$7/mo to start, or ~$0 with a free API).
# Everything (worker + Radian + Encompass + scheduler) runs IN-PROCESS inside one
# always-on API. Postgres + Key Value use free tiers. The PWA is a free static site.
#
# To scale out to the full 8-service architecture later, deploy render.full.yaml
# (separate worker, cron, and private services) — no code changes required.
#
# Cost notes (current defaults ≈ $6/mo):
#   - indigold-pwa (static) ............ free
#   - indigold-api (free) .............. $0  — sleeps after ~15 min idle; the
#                                         embedded worker/scheduler run only while
#                                         awake. Switch to `starter` (~$7) for
#                                         always-on background jobs + daily briefs.
#   - indigold-db (basic-256mb) ........ ~$6/mo — persistent (won't expire)
#   - indigold-cache / Key Value (free)  free (25 MB)

databases:
  - name: indigold-db
    databaseName: indigold
    user: indigold
    plan: basic-256mb     # persistent (does not expire). Use `free` for a 30-day trial db.
    region: oregon

services:
  # ---- Key Value (Redis): sessions, rate limits, token budget, job queue ----
  - type: redis
    name: indigold-cache
    plan: free            # 25 MB; plenty for sessions + a light job queue
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ---- Static Site: PWA (free) ----
  - type: web
    runtime: static
    name: indigold-pwa
    rootDir: apps/pwa
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: indigold-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ---- Web Service: API + embedded worker + scheduler + Radian/Encompass ----
  - type: web
    runtime: node
    name: indigold-api
    rootDir: apps/api
    plan: free            # $0 — NOTE: sleeps after ~15 min idle. The embedded
                          # worker/scheduler only run while the API is awake (it
                          # wakes on the next request). For reliable always-on
                          # background jobs + daily briefs, switch to `starter` (~$7/mo).
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_WORKER          # process the job queue in-process
        value: "true"
      - key: RUN_SCHEDULER       # self-schedule daily/weekly/monitor fan-out
        value: "true"
      - key: DAILY_TOKEN_BUDGET
        value: "200000"
      - key: DATABASE_URL
        fromDatabase:
          name: indigold-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: indigold-cache
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PWA_ORIGIN
        fromService:
          type: web
          name: indigold-pwa
          property: host
      # File upload -> PRIVATE S3-compatible object storage (Cloudflare R2 default).
      # Set these in the Render dashboard (sync:false keeps secrets out of git).
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_SIGNED_URL_TTL
        value: "900"
      - key: UPLOAD_MAX_BYTES
        value: "52428800"
      # RADIAN_URL / ENCOMPASS_URL intentionally unset -> intelligence runs in-process.
