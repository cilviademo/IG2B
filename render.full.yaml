# Render Blueprint — the Indigold platform (8 resources).
# Create/import under a Project named "Indigold".
# Adjust `plan` and `region` to your account. Private-service connectivity
# requires all services to share a region.

envVarGroups:
  - name: indigold-shared
    envVars:
      - key: INTERNAL_TOKEN        # shared secret guarding private-service calls
        generateValue: true
      - key: DAILY_TOKEN_BUDGET
        value: "200000"

databases:
  - name: indigold-db
    databaseName: indigold
    user: indigold
    plan: basic-256mb
    region: oregon

services:
  # ---------------------------------------------------------------- Key Value
  - type: redis
    name: indigold-cache
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []               # internal-only

  # ----------------------------------------------------------- Static Site PWA
  - type: web
    runtime: static
    name: indigold-pwa
    rootDir: apps/pwa
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: indigold-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --------------------------------------------------------------- Web API
  - type: web
    runtime: node
    name: indigold-api
    rootDir: apps/api
    plan: starter
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - fromGroup: indigold-shared
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: indigold-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: indigold-cache
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: RADIAN_URL
        fromService:
          type: pserv
          name: indigold-radian
          property: hostport
      - key: ENCOMPASS_URL
        fromService:
          type: pserv
          name: indigold-encompass
          property: hostport
      - key: PWA_ORIGIN
        fromService:
          type: web
          name: indigold-pwa
          property: host

  # --------------------------------------------------------- Background Worker
  - type: worker
    runtime: node
    name: indigold-worker
    rootDir: apps/worker
    plan: starter
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - fromGroup: indigold-shared
      - key: DATABASE_URL
        fromDatabase:
          name: indigold-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: indigold-cache
          property: connectionString
      - key: RADIAN_URL
        fromService:
          type: pserv
          name: indigold-radian
          property: hostport

  # ------------------------------------------------------------ Cron Scheduler
  - type: cron
    runtime: node
    name: indigold-scheduler
    rootDir: apps/scheduler
    region: oregon
    schedule: "0 13 * * *"        # daily 13:00 UTC (fans out daily/weekly/monitor)
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - fromGroup: indigold-shared
      - key: DATABASE_URL
        fromDatabase:
          name: indigold-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: indigold-cache
          property: connectionString

  # ----------------------------------------------------- Private Service: Radian
  - type: pserv
    runtime: node
    name: indigold-radian
    rootDir: services/radian
    plan: starter
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - fromGroup: indigold-shared

  # -------------------------------------------------- Private Service: Encompass
  - type: pserv
    runtime: node
    name: indigold-encompass
    rootDir: services/encompass
    plan: starter
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - fromGroup: indigold-shared
